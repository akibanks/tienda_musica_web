<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VinylVibes — Premium Vinyl Store</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3002/3002626.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ HEADER ═══════════════════════════════════════ -->
  <header class="site-header" id="site-header">
    <div class="header-content">

      <!-- Logo -->
      <a href="index.html" class="logo-link" aria-label="VinylVibes — Inicio">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="20" cy="20" r="19" stroke="url(#g1)" stroke-width="1.5"/>
              <circle cx="20" cy="20" r="12" stroke="url(#g1)" stroke-width="1" stroke-dasharray="3 2"/>
              <circle cx="20" cy="20" r="4" fill="url(#g1)"/>
              <circle cx="20" cy="20" r="2" fill="#09090b"/>
              <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="40" y2="40">
                  <stop offset="0%" stop-color="#f59e0b"/>
                  <stop offset="100%" stop-color="#ff6b6b"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>VinylVibes</h1>
        </div>
      </a>

      <!-- Nav -->
      <nav class="header-nav" aria-label="Navegación principal">
        <a href="#" class="nav-link nav-link--active">Catálogo</a>
        <a href="#" class="nav-link">Novedades</a>
        <a href="#" class="nav-link">Géneros</a>
      </nav>

      <!-- Auth — populated by script.js -->
      <div id="auth-section" class="auth-section">
        <button class="btn-ghost btn-sm" onclick="window.location.href='login.html'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Entrar
        </button>
      </div>

    </div>
  </header>

  <!-- ═══ HERO ══════════════════════════════════════════ -->
  <section class="hero-strip" aria-label="Presentación de la tienda">
    <div class="hero-strip__inner">
      <span class="hero-eyebrow">Colección 2025</span>
      <h2 class="hero-title">Música que<br><em>se siente</em></h2>
      <p class="hero-sub">Los mejores vinilos nuevos y de colección, curados para verdaderos audiophiles.</p>
    </div>

    <div class="hero-visual" aria-hidden="true">
      <div class="vinyl-spin">
        <svg  viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="heroGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#f59e0b"/>
              <stop offset="100%" stop-color="#b45309"/>
            </radialGradient>
          </defs>
          <circle cx="100" cy="100" r="99" fill="#141418" stroke="#2a2a35" stroke-width="1"/>
          <circle cx="100" cy="100" r="90" fill="none" stroke="#1e1e28" stroke-width="0.6"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#1a1a23" stroke-width="0.6"/>
          <circle cx="100" cy="100" r="70" fill="none" stroke="#1c1c25" stroke-width="0.6"/>
          <circle cx="100" cy="100" r="60" fill="none" stroke="#1e1e27" stroke-width="0.6"/>
          <circle cx="100" cy="100" r="50" fill="none" stroke="#1a1a24" stroke-width="0.6"/>
          <circle cx="100" cy="100" r="38" fill="#1c1c27" stroke="#28283a" stroke-width="0.5"/>
          <circle cx="100" cy="100" r="22" fill="url(#heroGrad)"/>
          <circle cx="100" cy="100" r="8" fill="#09090b"/>
        </svg>
      </div>
    </div>
  </section>

  <!-- ═══ TOOLBAR ═══════════════════════════════════════ -->
  <div class="toolbar" role="search">
    <div class="search-container">
      <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input
        type="search"
        id="input-busqueda"
        placeholder="Buscar artista, álbum o género…"
        autocomplete="off"
        aria-label="Buscar en el catálogo"
      >
    </div>
    <div class="toolbar-meta" aria-live="polite">
      <span class="catalog-label">Catálogo</span>
      <span class="catalog-count" id="catalog-count">— discos</span>
    </div>
  </div>

  <!-- ═══ MAIN — CATALOG ════════════════════════════════ -->
  <main class="main-container">
    <section
      id="contenedor-discos"
      class="grid-discos"
      aria-label="Catálogo de vinilos"
      aria-live="polite"
    >
      <!-- Skeleton placeholders (script.js los reemplaza) -->
      <div class="disco-card disco-card--skeleton" aria-hidden="true"></div>
      <div class="disco-card disco-card--skeleton" aria-hidden="true"></div>
      <div class="disco-card disco-card--skeleton" aria-hidden="true"></div>
      <div class="disco-card disco-card--skeleton" aria-hidden="true"></div>
      <div class="disco-card disco-card--skeleton" aria-hidden="true"></div>
      <div class="disco-card disco-card--skeleton" aria-hidden="true"></div>
    </section>
  </main>

  <!-- ═══ FOOTER ════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo" aria-label="VinylVibes">VinylVibes</span>
      <p class="footer-copy">© 2025 VinylVibes — Hecho con pasión por la música.</p>
    </div>
  </footer>

  <!-- ═══ MODAL EDICIÓN ════════════════════════════════ -->
  <div
    id="modal-edicion"
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
    style="display: none;"
  >
    <div class="modal-backdrop" onclick="cerrarModal()" aria-hidden="true"></div>

    <div class="modal-content">

      <div class="modal-header">
        <div class="modal-header-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <div>
          <h3 id="modal-title">Editar Disco</h3>
          <p class="modal-subtitle">Actualiza los datos del álbum en el catálogo.</p>
        </div>
        <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <form id="form-editar" class="modal-form" novalidate>
        <input type="hidden" id="edit-id">

        <div class="form-grid form-grid--two">
          <div class="input-group">
            <label for="edit-titulo">Título del Álbum</label>
            <input type="text" id="edit-titulo" placeholder="Ej: Dark Side of the Moon" required>
          </div>
          <div class="input-group">
            <label for="edit-artista">Artista / Banda</label>
            <input type="text" id="edit-artista" placeholder="Ej: Pink Floyd" required>
          </div>
        </div>

        <div class="form-grid form-grid--two">
          <div class="input-group">
            <label for="edit-precio">
              Precio <span class="label-tag">USD</span>
            </label>
            <input type="number" id="edit-precio" step="0.01" min="0" placeholder="0.00" required>
          </div>
          <div class="input-group">
            <label for="edit-stock">
              Stock <span class="label-tag">unidades</span>
            </label>
            <input type="number" id="edit-stock" min="0" placeholder="0" required>
          </div>
        </div>

        <div class="input-group">
          <label for="edit-imagen">URL de la Portada</label>
          <input type="url" id="edit-imagen" placeholder="https://…">
        </div>

        <div class="modal-botones">
          <button type="button" class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn-save">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            Guardar Cambios
          </button>
        </div>
      </form>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
