<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Inventario — VinylVibes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 0; }

    .admin-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .admin-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 32px;
    }

    .admin-header .header-content {
      max-width: 960px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .admin-header h1 {
      font-size: 1.15rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      background: var(--grad-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 24px;
    }

    .admin-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-xl);
      padding: 44px 48px;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow-card);
    }

    .admin-card__header {
      margin-bottom: 36px;
    }

    .admin-card__eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 8px;
      display: block;
    }

    .admin-card__header h2 {
      font-size: 1.65rem;
      margin-bottom: 4px;
    }

    .admin-card__header p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    #form-disco {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #form-disco .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    #form-disco button[type="submit"] {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    #mensaje-admin {
      text-align: center;
      font-size: 0.85rem;
      min-height: 16px;
    }

    @media (max-width: 560px) {
      .admin-card { padding: 32px 24px; }
      #form-disco .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <!-- Header -->
  <header class="admin-header">
    <div class="header-content">
      <h1>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Panel de Inventario
      </h1>
      <a href="index.html" class="btn-ghost btn-sm">
        ← Volver al Catálogo
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-card">

      <div class="admin-card__header">
        <span class="admin-card__eyebrow">Inventario</span>
        <h2>Nuevo Disco</h2>
        <p>Agrega un álbum al catálogo de la tienda.</p>
      </div>

      <form id="form-disco" novalidate>

        <div class="input-group">
          <label for="titulo">Título del Álbum</label>
          <input type="text" id="titulo" placeholder="Ej: Rumours" required>
        </div>

        <div class="input-group">
          <label for="artista">Artista / Banda</label>
          <input type="text" id="artista" placeholder="Ej: Fleetwood Mac" required>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="precio">
              Precio <span class="label-tag">USD</span>
            </label>
            <input type="number" id="precio" step="0.01" min="0" placeholder="0.00" required>
          </div>
          <div class="input-group">
            <label for="stock">
              Stock <span class="label-tag">uds</span>
            </label>
            <input type="number" id="stock" min="0" placeholder="0" required>
          </div>
        </div>

        <div class="input-group">
          <label for="imagen_url">URL de la Portada <span style="color:var(--text-muted); font-weight:400;">(opcional)</span></label>
          <input type="url" id="imagen_url" placeholder="https://…">
        </div>

        <button type="submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          Guardar en Catálogo
        </button>

        <p id="mensaje-admin"></p>
      </form>

    </div>
  </main>

</div>

<script src="admin.js"></script>
</body>
</html>
