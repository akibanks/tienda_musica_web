<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Inventario — VinylVibes</title>
  <link rel="icon" type="image/png" href="record.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 0; }

    .admin-layout {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .admin-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      padding: 0 32px;
    }

    .admin-header .header-content {
      max-width: 960px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 16px;
    }

    .admin-header h1 {
      font-size: 1.15rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      background: var(--grad-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .admin-main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 24px;
    }

    .admin-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-xl);
      padding: 44px 48px;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow-card);
    }

    .admin-card__header {
      margin-bottom: 36px;
    }

    .admin-card__eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 8px;
      display: block;
    }

    .admin-card__header h2 {
      font-size: 1.65rem;
      margin-bottom: 4px;
    }

    .admin-card__header p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    #form-disco {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #form-disco .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    #form-disco button[type="submit"] {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 0.9rem;
      margin-top: 4px;
    }

    #mensaje-admin {
      text-align: center;
      font-size: 0.85rem;
      min-height: 16px;
    }

    @media (max-width: 560px) {
      .admin-card { padding: 32px 24px; }
      #form-disco .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="admin-layout">

  <!-- Header -->
  <header class="admin-header">
    <div class="header-content">
      <h1>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Panel de Inventario
      </h1>
      <a href="index.html" class="btn-ghost btn-sm">
        ← Volver al Catálogo
      </a>
    </div>
  </header>

  <!-- Main -->
  <main class="admin-main">
    <div class="admin-card">

      <div class="admin-card__header">
        <span class="admin-card__eyebrow">Inventario</span>
        <h2>Nuevo Disco</h2>
        <p>Agrega un álbum al catálogo de la tienda.</p>
      </div>

      <form id="form-disco" novalidate>

        <div class="input-group">
          <label for="titulo">Título del Álbum</label>
          <input type="text" id="titulo" placeholder="Ej: Rumours" required>
        </div>

        <div class="input-group">
          <label for="artista">Artista / Banda</label>
          <input type="text" id="artista" placeholder="Ej: Fleetwood Mac" required>
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="precio">
              Precio <span class="label-tag">USD</span>
            </label>
            <input type="number" id="precio" step="0.01" min="0" placeholder="0.00" required>
          </div>
          <div class="input-group">
            <label for="stock">
              Stock <span class="label-tag">uds</span>
            </label>
            <input type="number" id="stock" min="0" placeholder="0" required>
          </div>
        </div>

        <div class="input-group">
          <label for="imagen_url">URL de la Portada <span style="color:var(--text-muted); font-weight:400;">(opcional)</span></label>
          <input type="url" id="imagen_url" placeholder="https://…">
        </div>

        <div class="form-row">
          <div class="input-group">
            <label for="anio">Año <span style="color:var(--text-muted); font-weight:400;">(opcional)</span></label>
            <input type="number" id="anio" min="1900" max="2099" placeholder="Ej: 1979">
          </div>
          <div class="input-group">
            <label for="genero">Género <span style="color:var(--text-muted); font-weight:400;">(opcional)</span></label>
            <input type="text" id="genero" placeholder="Ej: Rock, Jazz, Pop…">
          </div>
        </div>

        <div class="input-group">
          <label for="historia_cuerpo">Historia del álbum <span style="color:var(--text-muted); font-weight:400;">(opcional)</span></label>
          <textarea id="historia_cuerpo" rows="5" placeholder="Curiosidades, contexto histórico, anécdotas…" style="resize:vertical; min-height:90px; background:var(--bg-raised); border:1px solid var(--border-dim); border-radius:var(--r-sm); color:var(--text-primary); padding:12px 14px; font-family:inherit; font-size:0.875rem; width:100%; outline:none;"></textarea>
        </div>

        <button type="submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          Guardar en Catálogo
        </button>

        <p id="mensaje-admin"></p>
      </form>

    </div>
  </main>

</div>

      <!-- ── Importar desde Discogs ── -->
      <div class="admin-card" style="margin-top: 32px;">
        <div class="admin-card__header">
          <span class="admin-card__eyebrow">Discogs</span>
          <h2>Importar Disco</h2>
          <p>Busca un álbum en Discogs e impórtalo automáticamente con video y historia.</p>
        </div>

        <!-- Buscador -->
        <div class="input-group" style="margin-bottom: 16px;">
          <label for="discogs-query">Buscar en Discogs</label>
          <div style="display:flex; gap:10px;">
            <input type="text" id="discogs-query" placeholder="Ej: Rumours Fleetwood Mac" style="flex:1;">
            <button type="button" id="btn-discogs-buscar" style="white-space:nowrap; padding: 0 20px;">
              Buscar
            </button>
          </div>
        </div>

        <!-- Resultados -->
        <div id="discogs-resultados" style="display:none; margin-bottom: 20px;">
          <p style="font-size:0.8rem; color:var(--text-muted); margin-bottom:10px;">Selecciona un disco para importar:</p>
          <div id="discogs-lista" style="display:flex; flex-direction:column; gap:10px; max-height:400px; overflow-y:auto;"></div>
        </div>

        <!-- Formulario de importación -->
        <div id="discogs-form-importar" style="display:none;">
          <div style="background:var(--bg-raised); border:1px solid var(--border-subtle); border-radius:var(--r-sm); padding:16px; margin-bottom:16px; display:flex; gap:16px; align-items:center;">
            <img id="discogs-preview-img" src="" alt="" style="width:70px; height:70px; object-fit:cover; border-radius:8px; display:none;">
            <div>
              <p id="discogs-preview-titulo" style="font-weight:600; margin-bottom:4px;"></p>
              <p id="discogs-preview-info" style="font-size:0.8rem; color:var(--text-muted);"></p>
            </div>
          </div>
          <div class="form-row">
            <div class="input-group">
              <label for="discogs-precio">Precio <span class="label-tag">USD</span></label>
              <input type="number" id="discogs-precio" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="input-group">
              <label for="discogs-stock">Stock <span class="label-tag">uds</span></label>
              <input type="number" id="discogs-stock" min="0" placeholder="10" value="10">
            </div>
          </div>
          <button type="button" id="btn-discogs-importar" style="width:100%; justify-content:center; padding:14px; margin-top:8px;">
            ⬇ Importar disco
          </button>
          <p id="mensaje-discogs" style="text-align:center; font-size:0.85rem; min-height:16px; margin-top:8px;"></p>
        </div>
      </div>


<script src="admin.js"></script>
</body>
</html>
