<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar / Registro - Tienda de Vinilos</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3002/3002626.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="auth-form">
            
            <div id="vista-login">
                <h2 style="text-align: center; margin-bottom: 25px;">
                    <span style="background: linear-gradient(45deg, #ff6b6b, #ffb6b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Iniciar Sesión</span>
                </h2>

                <form id="login-form">
                    <div class="input-group">
                        <label for="username">Usuario</label>
                        <input type="text" id="username" placeholder="Tu usuario" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" style="width: 100%; margin-top: 15px;">Entrar</button>
                </form>
                
                <p id="mensaje-error-login" style="color: #ff4444; font-size: 0.9rem; text-align: center; margin-top: 15px;"></p>

                <div style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #b3b3b3;">
                    ¿No tienes cuenta? <a href="#" onclick="cambiarVista()" style="color: #ffb6b6; text-decoration: none; font-weight: bold;">Regístrate aquí</a>
                </div>
            </div>

            <div id="vista-registro" style="display: none;">
                <h2 style="text-align: center; margin-bottom: 25px;">
                    <span style="background: linear-gradient(45deg, #ff6b6b, #ffb6b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Crear Cuenta</span>
                </h2>

                <form id="registro-form">
                    <div class="input-group">
                        <label for="new-username">Nuevo Usuario</label>
                        <input type="text" id="new-username" placeholder="Ej. rockero99" required>
                    </div>
                    <div class="input-group">
                        <label for="new-email">Correo Electrónico</label>
                        <input type="email" id="new-email" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="input-group">
                        <label for="new-password">Contraseña</label>
                        <input type="password" id="new-password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" style="width: 100%; margin-top: 15px;">Registrarse</button>
                </form>

                <div style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #b3b3b3;">
                    ¿Ya tienes cuenta? <a href="#" onclick="cambiarVista()" style="color: #ffb6b6; text-decoration: none; font-weight: bold;">Inicia sesión</a>
                </div>
            </div>

            <div style="text-align: center; margin-top: 25px;">
                <a href="index.html" style="color: #777; text-decoration: none; font-size: 0.85rem; border-bottom: 1px solid #777; padding-bottom: 2px;">← Volver a la tienda</a>
            </div>

        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
